<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教案上傳 - AI教案評論系統</title>
    <link rel="icon" type="image/svg+xml" href="/app/assets/LPR.svg" />
    <script
      src="https://kit.fontawesome.com/632ceaca97.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="/app/upload.css" />
  </head>
  <body>
    <div class="upload-container">
      <div class="upload-card">
        <div class="upload-icon">
          <i class="fa-solid fa-cloud-arrow-up"></i>
        </div>

        <h1>教案輔助評論系統</h1>
        <p class="upload-text">請上傳教案來使用教案輔助評論系統</p>

        <form id="uploadForm" class="upload-zone" enctype="multipart/form-data">
          <input
            type="file"
            id="fileInput"
            name="file"
            accept=".doc,.docx,.pdf,.txt"
            hidden
          />
          <label for="fileInput" class="upload-label">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <span>點擊選擇或拖放檔案</span>
            <small>支持格式：.doc, .docx, .pdf, .txt</small>
          </label>
          <div id="fileName" class="file-name"></div>
        </form>

        <div class="upload-auth-inline">
          <div data-auth-user class="upload-auth-inline__user">目前未登入</div>
          <div
            data-auth-button
            class="upload-auth-inline__button"
            aria-label="Google 登入"
          ></div>
        </div>

        <button id="uploadBtn" class="upload-btn" type="button" disabled>
          上傳並開始評論
        </button>
        <div id="uploadStatus" class="upload-status"></div>
      </div>
    </div>

    <div id="duplicateModal" class="duplicate-modal" hidden>
      <div class="duplicate-modal__card" role="dialog" aria-modal="true">
        <h2>偵測到相同教案資料</h2>
        <p id="duplicateSummary" class="duplicate-modal__summary"></p>
        <ul id="duplicateList" class="duplicate-modal__list"></ul>
        <div class="duplicate-modal__actions">
          <button
            id="reuseHistoryBtn"
            class="duplicate-modal__btn"
            type="button"
          >
            顯示之前資料
          </button>
          <button
            id="clearHistoryBtn"
            class="duplicate-modal__btn duplicate-modal__btn--danger"
            type="button"
          >
            清除之前資料
          </button>
        </div>
      </div>
    </div>

    <script src="/app/auth.js"></script>
    <script src="/app/api.js"></script>
    <script src="/app/auth-ui.js"></script>
    <script src="/app/upload.js"></script>
  </body>
</html>
