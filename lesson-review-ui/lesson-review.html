<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 教案評論系統</title>
    <link rel="icon" type="image/svg+xml" href="/app/assets/LPR.svg" />
    <script
      src="https://kit.fontawesome.com/632ceaca97.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar" aria-label="主要功能選單">
        <button class="menu-btn" type="button" aria-label="展開選單">
          <i class="fa-solid fa-bars"></i>
        </button>

        <nav class="nav-list">
          <button
            class="nav-item"
            type="button"
            onclick="window.location.href = './index.html'"
          >
            <i class="nav-icon fa-solid fa-comment-dots"></i>
            <span>AI自由對話</span>
          </button>
          <button class="nav-item active" type="button" aria-current="page">
            <i class="nav-icon fa-solid fa-pen-nib"></i>
            <span>AI教案評論</span>
          </button>
          <button
            class="nav-item"
            type="button"
            onclick="window.location.href = './lesson-score.html'"
          >
            <i class="nav-icon fa-solid fa-clipboard-list"></i>
            <span>紀錄教案評分</span>
          </button>
          <button
            class="nav-item"
            type="button"
            onclick="window.location.href = './lesson-view.html'"
          >
            <i class="nav-icon fa-solid fa-file-lines"></i>
            <span>查看教案</span>
          </button>
          <div class="nav-auth-block">
            <div data-auth-user class="nav-auth-user">目前未登入</div>
            <div
              data-auth-button
              class="nav-item nav-auth-button"
              aria-label="Google 登入"
            ></div>
          </div>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="review-canvas" aria-label="教案評論區">
          <!-- 中央：AI評論結果區域 -->
          <div id="reviewResult" class="review-result">
            <!-- AI評論內容將自動生成 -->
          </div>

          <!-- 重新生成按鈕 -->
          <div class="regenerate-section">
            <button id="regenerateBtn" class="regenerate-btn" type="button">
              <i class="fa-solid fa-rotate-right"></i>
              重新生成評論
            </button>
          </div>

          <!-- 底部輸入組 -->
          <form id="chatForm" class="composer" autocomplete="off">
            <label class="sr-only" for="chatInput">輸入訊息</label>
            <input
              id="chatInput"
              name="chatInput"
              type="text"
              placeholder="輸入你對教案的提問或要求..."
              required
            />
            <button
              id="sendBtn"
              class="send-btn"
              type="submit"
              aria-label="送出訊息"
            >
              <i
                class="fa-regular fa-paper-plane fa-rotate-by"
                style="--fa-rotate-angle: 45deg"
              ></i>
            </button>
          </form>
        </section>

        <section id="commentEditor" class="comment-editor" hidden>
          <h2 class="comment-editor__title">評論修改器</h2>

          <!-- 顯示選取的原始評論 -->
          <div class="comment-editor__original">
            <label>選取的評論：</label>
            <p id="originalTextDisplay">尚未選取評論</p>
          </div>

          <div class="comment-editor__panel">
            <textarea
              id="commentEditorInput"
              class="comment-editor__input"
              placeholder="請輸入修改指示，例如：讓語氣更友善、補充具體建議..."
            ></textarea>

            <!-- 錯誤訊息區 -->
            <div
              id="commentEditorError"
              class="comment-editor__error"
              hidden
            ></div>

            <div class="comment-editor__actions">
              <button
                id="commentEditorCancel"
                class="comment-editor__btn"
                type="button"
              >
                取消
              </button>
              <button
                id="commentEditorApply"
                class="comment-editor__btn comment-editor__btn--primary"
                type="button"
              >
                確定修改評論
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app/auth.js"></script>
    <script src="/app/api.js"></script>
    <script src="/app/auth-ui.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/app/helpers/markdown-renderer.js"></script>
    <script src="/app/lesson-review.js"></script>
  </body>
</html>
