<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 教案評論系統</title>
    <link rel="icon" type="image/svg+xml" href="/app/assets/LPR.svg" />
    <script
      src="https://kit.fontawesome.com/632ceaca97.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar" aria-label="主要功能選單">
        <button class="menu-btn" type="button" aria-label="展開選單">
          <i class="fa-solid fa-bars"></i>
        </button>

        <nav class="nav-list">
          <button
            class="nav-item active"
            type="button"
            onclick="window.location.href = './lesson-review.html'"
            aria-current="page"
          >
            <i class="nav-icon fa-solid fa-pen-nib"></i>
            <span>AI教案評論</span>
          </button>
          <button
            class="nav-item"
            type="button"
            onclick="window.location.href = './index.html'"
          >
            <i class="nav-icon fa-solid fa-message"></i>
            <span>AI自由對話</span>
          </button>
          <button
            class="nav-item"
            type="button"
            onclick="window.location.href = './lesson-score.html'"
          >
            <i class="nav-icon fa-solid fa-clipboard-list"></i>
            <span>記錄教案評分</span>
          </button>
          <button
            class="nav-item nav-item--action"
            type="button"
            data-nav-action="reupload"
          >
            <i class="nav-icon fa-solid fa-arrow-up-from-bracket"></i>
            <span>重新上傳</span>
          </button>
          <button
            class="nav-item nav-item--danger"
            type="button"
            data-nav-action="delete-history"
          >
            <i class="nav-icon fa-solid fa-trash"></i>
            <span>刪除紀錄</span>
          </button>
        </nav>
      </aside>

      <main class="main-panel">
        <section class="review-canvas" aria-label="教案評論區">
          <!-- 中央：AI 評論畫布區域 -->
          <div id="reviewResult" class="review-result">
            <!-- AI評論內容將自動生成 -->
          </div>

          <!-- 底部操作：重新生成評論 -->
          <div class="regenerate-section">
            <button id="regenerateBtn" class="regenerate-btn" type="button">
              <i class="fa-solid fa-rotate-right"></i>
              重新生成評論
            </button>
            <button id="exportReviewBtn" class="regenerate-btn" type="button">
              <i class="fa-solid fa-download"></i>
              匯出評論 PDF
            </button>
          </div>
        </section>

        <!-- 文字選擇菜單 -->
        <section id="selectionMenu" class="selection-menu" hidden>
          <div class="selection-menu__header">
            <span id="selectionMenuText" class="selection-menu__text"
              >選取的文本</span
            >
          </div>
          <div class="selection-menu__buttons">
            <button
              id="addToScoreBtn"
              class="selection-menu__btn selection-menu__btn--primary"
              type="button"
            >
              <i class="fa-solid fa-plus-circle"></i>
              加入評分說明
            </button>
            <button
              id="editCommentBtn"
              class="selection-menu__btn selection-menu__btn--secondary"
              type="button"
            >
              <i class="fa-solid fa-pen"></i>
              開啟評論修改器
            </button>
          </div>
        </section>

        <section id="commentEditor" class="comment-editor" hidden>
          <h2 class="comment-editor__title">評論修改器</h2>

          <!-- 顯示選取的原始評論 -->
          <div class="comment-editor__original">
            <label>選取的評論：</label>
            <p id="originalTextDisplay">尚未選取評論</p>
          </div>

          <div class="comment-editor__panel">
            <textarea
              id="commentEditorInput"
              class="comment-editor__input"
              placeholder="請輸入修改指示，例如：讓語氣更友善、補充具體建議..."
            ></textarea>

            <!-- 錯誤訊息區 -->
            <div
              id="commentEditorError"
              class="comment-editor__error"
              hidden
            ></div>

            <div class="comment-editor__actions">
              <button
                id="commentEditorCancel"
                class="comment-editor__btn"
                type="button"
              >
                取消
              </button>
              <button
                id="commentEditorApply"
                class="comment-editor__btn comment-editor__btn--primary"
                type="button"
              >
                確定修改評論
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/app/auth.js"></script>
    <script src="/app/api.js"></script>
    <script src="/app/auth-ui.js"></script>
    <script src="/app/pdf-export.js"></script>
    <script src="/app/lesson-shared-actions.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="/app/helpers/markdown-renderer.js"></script>
    <script src="/app/lesson-review.js"></script>
  </body>
</html>
