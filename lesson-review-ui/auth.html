<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教案輔助評論系統 - Google 登入</title>
  <meta
    name="google-signin-client_id"
    content="1093022180573-2a2h5iridfvbjtqbig5av2gto2kqcui1.apps.googleusercontent.com"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      max-width: 400px;
      width: 100%;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .logo p {
      color: #666;
      font-size: 14px;
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      color: #ccc;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      margin: 0 15px;
      color: #999;
      font-size: 14px;
    }

    .signin-button-container {
      display: flex;
      justify-content: center;
      margin: 20px 0;
    }

    .signin-button-container #g_id_onload {
      display: flex;
      justify-content: center;
    }

    .g_id_signin {
      display: flex;
      justify-content: center !important;
    }

    .error-message {
      color: #d32f2f;
      background: #ffebee;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .error-message.show {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      font-size: 14px;
    }

    .loading.show {
      display: block;
    }

    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      text-align: center;
      color: #999;
      font-size: 12px;
    }

    .features {
      margin: 20px 0;
      color: #666;
      font-size: 13px;
    }

    .features ul {
      list-style: none;
      margin-top: 10px;
    }

    .features li {
      padding: 5px 0;
      display: flex;
      align-items: center;
    }

    .features li::before {
      content: "✓";
      color: #4caf50;
      font-weight: bold;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>📚 教案評論系統</h1>
      <p>Lesson Plan Review System</p>
    </div>

    <div class="features">
      <strong>功能特色：</strong>
      <ul>
        <li>AI 智能評論生成</li>
        <li>教案結構分析</li>
        <li>自動評分建議</li>
        <li>個人評論記錄</li>
      </ul>
    </div>

    <div class="divider">
      <span>開始使用</span>
    </div>

    <div class="error-message" id="errorMessage"></div>

    <div class="signin-button-container">
      <div
        id="g_id_onload"
        data-client_id="1093022180573-2a2h5iridfvbjtqbig5av2gto2kqcui1.apps.googleusercontent.com"
        data-callback="handleSignIn"
      ></div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div class="loading" id="loadingMessage">正在連接...請稍候</div>

    <div class="footer">
      <p>使用 Google 帳號登入</p>
      <p>您的數據將被加密保護</p>
    </div>
  </div>

  <!-- Google Sign-In SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- 驗證邏輯 -->
  <script src="auth.js"></script>
  <script>
    async function handleSignIn(response) {
      const loadingEl = document.getElementById("loadingMessage");
      const errorEl = document.getElementById("errorMessage");

      loadingEl.classList.add("show");
      errorEl.classList.remove("show");
      errorEl.textContent = "";

      try {
        await window.LPRAuth.handleGoogleCallback(response);
      } catch (error) {
        loadingEl.classList.remove("show");
        errorEl.textContent = `登入失敗: ${error.message}`;
        errorEl.classList.add("show");
      }
    }

    // 初始化頁面
    window.addEventListener("DOMContentLoaded", async () => {
      await window.LPRAuth.initGoogleAuth();

      // 如果已登入，直接重定向
      if (window.LPRAuth.isAuthenticated()) {
        window.location.href = "/app/upload.html";
      }

      // 監聽驗證事件
      window.addEventListener("lpr:auth:success", () => {
        document.getElementById("loadingMessage").textContent = "登入成功！即將跳轉...";
      });

      window.addEventListener("lpr:auth:error", (e) => {
        document.getElementById("loadingMessage").classList.remove("show");
        document.getElementById("errorMessage").textContent = `錯誤: ${e.detail}`;
        document.getElementById("errorMessage").classList.add("show");
      });
    });
  </script>
</body>
</html>
